```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>RxFood — Drug-Food Interaction Visualizer</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
background:#0a0e1a;
color:#e2e8f0;
font-family:'DM Sans',sans-serif;

}

nav{

}

}

}

}

</style>
</head>

<body>

<nav>
<div class="nav-logo">RxFood</div>
</nav>

<section class="hero">
<h1>Drug-Food Interaction Visualizer</h1>
<p>Search a medicine or food to discover possible interactions.</p>
</section>

<section class="search-section">

<div class="search-box">
<input id="searchInput" placeholder="Search drug or food...">
<button class="search-btn" onclick="search()">Analyze</button>
</div>

<div class="quick-pills" id="pills"></div>

</section>

<section id="results"></section>

<div class="modal-overlay" id="modal">
<div class="modal">
<h2 id="modalTitle"></h2>
<p id="modalText"></p>
<button class="close-btn" onclick="closeModal()">Close</button>
</div>
</div>

<script>

const database=[

{
drug:"Warfarin",
class:"Anticoagulant",
interactions:[
{food:"Leafy Greens",severity:"high",mechanism:"Vitamin K reduces anticoagulant effect"},
{food:"Cranberry",severity:"medium",mechanism:"May increase bleeding risk"}
]
},

{
drug:"Simvastatin",
class:"Statin",
interactions:[
{food:"Grapefruit",severity:"high",mechanism:"Blocks CYP3A4 metabolism causing toxicity"}
]
},

{
drug:"Metformin",
class:"Antidiabetic",
interactions:[
{food:"Alcohol",severity:"medium",mechanism:"Risk of lactic acidosis"}
]
},

{
drug:"Ciprofloxacin",
class:"Antibiotic",
interactions:[
{food:"Dairy",severity:"medium",mechanism:"Calcium reduces drug absorption"}
]
}

]

const pills=document.getElementById("pills")
const results=document.getElementById("results")

database.forEach(d=>{
let b=document.createElement("button")
b.className="pill"
b.innerText=d.drug
b.onclick=()=>{
document.getElementById("searchInput").value=d.drug
search()
}
pills.appendChild(b)
})

function search(){

let q=document.getElementById("searchInput").value.toLowerCase()
results.innerHTML=""

database.forEach(d=>{

if(d.drug.toLowerCase().includes(q)){

let card=document.createElement("div")
card.className="drug-card"

card.innerHTML=`
<div class="drug-name">${d.drug}</div>
<div class="interactions-grid"></div>
`

let grid=card.querySelector(".interactions-grid")

d.interactions.forEach(i=>{

let ic=document.createElement("div")
ic.className="ic "+i.severity

ic.innerHTML=`
<div class="ic-food-name">${i.food}</div>
<div class="ic-mech">${i.mechanism}</div>
`

ic.onclick=()=>openModal(d.drug,i)

grid.appendChild(ic)

})

results.appendChild(card)

}

})

}

function openModal(drug,i){

document.getElementById("modalTitle").innerText=drug+" + "+i.food
document.getElementById("modalText").innerText=i.mechanism
document.getElementById("modal").style.display="flex"

}

function closeModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
