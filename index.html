```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RxFood — Drug Food Interaction Visualizer</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0f1117;

}

}

}

}

</style>
</head>

<body>

<header>RxFood Interaction Visualizer</header>

<div class="container">

<div class="search-box">
<input id="searchInput" placeholder="Search drug or food...">
<button onclick="search()">Analyze</button>
</div>

<div id="suggestions"></div>

<div class="quick-pills" id="quickPills"></div>

<div class="results" id="results"></div>

<footer>
⚠ Educational tool only. Consult healthcare professionals for medical advice.
</footer>

</div>

<script>

const db = [

{
drug:"Warfarin",
interactions:[
{
food:"Leafy Greens",
severity:"high",
reason:"Vitamin K reduces anticoagulant effect",
pathway:[
"Leafy greens consumed",
"Vitamin K increases",
"Warfarin effect reduced",
"Clotting risk increases"
]
},
{
food:"Cranberry Juice",
severity:"medium",
reason:"May increase bleeding risk",
pathway:[
"Cranberry compounds absorbed",
"Metabolism altered",
"Warfarin level increases"
]
}
]
},

{
drug:"Simvastatin",
interactions:[
{
food:"Grapefruit",
severity:"high",
reason:"Blocks CYP3A4 metabolism",
pathway:[
"Grapefruit eaten",
"CYP3A4 inhibited",
"Drug metabolism reduced",
"Statin toxicity risk"
]
}
]
},

{
drug:"Metformin",
interactions:[
{
food:"Alcohol",
severity:"medium",
reason:"May cause lactic acidosis",
pathway:[
"Alcohol intake",
"Liver metabolism change",
"Lactate buildup"
]
}
]
},

{
drug:"Ibuprofen",
interactions:[
{
food:"Alcohol",
severity:"high",
reason:"Increases stomach bleeding",
pathway:[
"Alcohol irritates stomach",
"NSAID damages lining",
"Bleeding risk increases"
]
}
]
},

{
drug:"Aspirin",
interactions:[
{
food:"Alcohol",
severity:"high",
reason:"Higher risk of stomach bleeding",
pathway:[
"Alcohol intake",
"Gastric irritation",
"Platelet inhibition"
]
}
]
},

{
drug:"Ciprofloxacin",
interactions:[
{
food:"Dairy",
severity:"medium",
reason:"Calcium blocks antibiotic absorption",
pathway:[
"Calcium binds drug",
"Absorption reduced",
"Antibiotic effect decreases"
]
}
]
}

];

const input=document.getElementById("searchInput");
const suggestions=document.getElementById("suggestions");
const results=document.getElementById("results");
const quick=document.getElementById("quickPills");

function loadPills(){
db.forEach(d=>{
let b=document.createElement("button");
b.className="pill";
b.innerText=d.drug;
b.onclick=()=>{
input.value=d.drug;
search();
};
quick.appendChild(b);
});
}

function search(){

let q=input.value.toLowerCase();
results.innerHTML="";

db.forEach(d=>{

if(d.drug.toLowerCase()==q){

d.interactions.forEach(i=>{
createCard(d.drug,i);
});

}

d.interactions.forEach(i=>{
if(i.food.toLowerCase()==q){
createFoodCard(i.food,d.drug,i);
}
});

});

}

function createCard(drug,i){

let card=document.createElement("div");
card.className="card "+i.severity;

card.innerHTML=`
<h3>${drug} + ${i.food}</h3>
<p><b>Severity:</b> ${i.severity}</p>
<p>${i.reason}</p>
<button onclick="openModal('${i.food}','${i.reason}','${i.pathway.join("|")}')">View Pathway</button>
`;

results.appendChild(card);

}

function createFoodCard(food,drug,i){

let card=document.createElement("div");
card.className="card "+i.severity;

card.innerHTML=`
<h3>${food} with ${drug}</h3>
<p><b>Severity:</b> ${i.severity}</p>
<p>${i.reason}</p>
`;

results.appendChild(card);

}

input.addEventListener("input",()=>{

let q=input.value.toLowerCase();
suggestions.innerHTML="";

db.forEach(d=>{
if(d.drug.toLowerCase().includes(q)){
let s=document.createElement("div");
s.innerText=d.drug;
s.onclick=()=>{
input.value=d.drug;
suggestions.innerHTML="";
search();
};
suggestions.appendChild(s);
}
});

});

function openModal(food,reason,path){

let steps=path.split("|");

let modal=document.createElement("div");
modal.className="modal";

let list="";
steps.forEach(s=>{
list+=`<li>${s}</li>`;
});

modal.innerHTML=`
<div class="modal-content">
<h2>${food} Interaction</h2>
<p>${reason}</p>
<h3>Molecular Pathway</h3>
<ul>${list}</ul>
<button onclick="this.parentElement.parentElement.remove()">Close</button>
</div>
`;

document.body.appendChild(modal);

}

loadPills();

</script>

</body>
</html>
